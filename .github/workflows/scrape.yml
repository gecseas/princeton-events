name: Scrape Events

on:
  schedule:
    # Runs every Monday and Thursday at 7:00 AM UTC (3:00 AM ET)
    - cron: "0 7 * * 1,4"
  workflow_dispatch:  # Allows manual trigger from the GitHub Actions UI

permissions:
  contents: write  # Needed to commit the updated events.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scrapers
        run: python -m scrapers.run_all

      - name: Commit updated events.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          # Only commit if something actually changed
          git diff --cached --quiet || git commit -m "chore: update events.json [$(date -u '+%Y-%m-%d')]"
          git push
